// Декларативный Plugin DSL — стандарт с Flutter 3.16+
// Версии обновлены под Flutter 3.41.6 (stable, апрель 2026)
pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def path = properties.getProperty("flutter.sdk")
        assert path != null, "flutter.sdk not set in local.properties"
        return path
    }()
    settings.ext.flutterSdkPath = flutterSdkPath

    includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    // AGP 8.9.1 + Gradle 8.10.2 + Kotlin 2.1.0 = проверенная связка для Flutter 3.41.6
    id "com.android.application"      version "8.9.1"  apply false
    id "org.jetbrains.kotlin.android" version "2.1.0"  apply false
}

include ":app"
