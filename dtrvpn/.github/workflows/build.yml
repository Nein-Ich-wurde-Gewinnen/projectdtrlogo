name: Build DTR VPN APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java 17 ───────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── Go 1.22 ───────────────────────────────────────────────────────────
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      # ── Cache Go modules ──────────────────────────────────────────────────
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-mod-${{ hashFiles('core/go.mod') }}
          restore-keys: go-mod-

      # ── Flutter stable ────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── Android NDK 28.2 (через sdkmanager — Gradle находит сам) ─────────
      - name: Setup Android NDK
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;28.2.13676358" 2>&1 | tail -5
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/28.2.13676358" >> "$GITHUB_ENV"

      # ── Create android/local.properties ───────────────────────────────────
      - name: Create android/local.properties
        run: |
          echo "flutter.sdk=$(which flutter | sed 's|/bin/flutter||')" \
            > android/local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> android/local.properties
          cat android/local.properties

      # ── Decode Keystore (опционально) ─────────────────────────────────────
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            mkdir -p android/app/build
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/build/keystore.jks
            echo "Keystore decoded OK"
          else
            echo "No keystore secret — skipping"
          fi

      # ── Build Mihomo core (libclash.so) ───────────────────────────────────
      - name: Build Mihomo core (libclash.so)
        run: |
          chmod +x build_core.sh
          BUILD_ARCHES="arm64" ./build_core.sh

      # ── Flutter pub get ───────────────────────────────────────────────────
      - name: Flutter pub get
        run: flutter pub get

      # ── Build Debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        run: flutter build apk --debug --target-platform android-arm64

      # ── Build Release APK ─────────────────────────────────────────────────
      - name: Build Release APK
        run: flutter build apk --release --target-platform android-arm64
        continue-on-error: true  # без keystore будет unsigned, это нормально

      # ── Collect APKs ──────────────────────────────────────────────────────
      - name: Collect APKs
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          APK="build/app/outputs/flutter-apk"
          mkdir -p dist
          [ -f "$APK/app-debug.apk"   ] && cp "$APK/app-debug.apk"   "dist/DTR-VPN-debug-${DATE}.apk"
          [ -f "$APK/app-release.apk" ] && cp "$APK/app-release.apk" "dist/DTR-VPN-release-${DATE}.apk"
          ls -lh dist/

      # ── Upload APKs ───────────────────────────────────────────────────────
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: DTR-VPN-APK
          path: dist/*.apk
          retention-days: 30
          if-no-files-found: error

      # ── Build summary ─────────────────────────────────────────────────────
      - name: Build summary
        if: always()
        run: |
          echo "## DTR VPN Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Файл | Размер |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          for f in dist/*.apk; do
            [ -f "$f" ] && echo "| $(basename $f) | $(du -sh "$f" | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          done || true
